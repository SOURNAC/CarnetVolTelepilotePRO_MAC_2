name: Build Mac App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Recuperer les fichiers
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dependances
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-mac.txt

      - name: Construire l'application Mac
        run: |
          python -m PyInstaller --noconfirm --clean CarnetVolTelepilotePRO_mac.spec

      - name: Compresser l'application
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent CarnetVolTelepilotePRO.app CarnetVolTelepilotePRO_APP_MAC.zip

      - name: Mettre le fichier en telechargement
        uses: actions/upload-artifact@v4
        with:
          name: CarnetVolTelepilotePRO_APP_MAC
          path: dist/CarnetVolTelepilotePRO_APP_MAC.zip
